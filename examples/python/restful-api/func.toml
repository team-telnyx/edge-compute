[edge_compute]
func_id = "restful-api-python"
func_name = "restful-api-python"

[env_vars]
# REST API configuration
DATABASE_PATH = "/tmp/api.db"                     # SQLite database path (⚠️ ephemeral in serverless)
MAX_PRODUCTS = "1000"                             # Maximum products limit
PAGE_SIZE = "50"                                  # Default pagination size
API_VERSION = "v1"                                # API version

# Service metadata
SERVICE_NAME = "restful-api"
VERSION = "1.0.0"

# Security/Debug (NEVER enable DEBUG_MODE in production)
DEBUG_MODE = "false"                              # Enable verbose logging with sensitive data

# Secrets configuration:
# Use telnyx-edge secrets add <name> <value> to add the following secrets:
# telnyx-edge secrets add DATABASE_URL "postgresql://user:pass@host:port/db"
# telnyx-edge secrets add API_KEY "your-api-key"
# telnyx-edge secrets add JWT_SECRET "your-jwt-secret"

# Required secrets:
# - DATABASE_URL: External database connection string (recommended for production)

# Optional secrets:
# - API_KEY: API key for authentication and rate limiting
# - JWT_SECRET: Secret for JWT token-based authentication
# - REDIS_URL: Redis connection for caching and session storage
# - NOTIFICATION_SERVICE_URL: URL for order notifications