[edge_compute]
func_id = "json-transformer-python"
func_name = "json-transformer-python"

[env_vars]
# JSON transformation configuration
MAX_JSON_SIZE = "1048576"                          # Maximum JSON size in bytes (1MB)
TRANSFORMATION_HISTORY_LIMIT = "100"               # Max transformations to remember
DEFAULT_SEPARATOR = "."                            # Default separator for flatten operations

# Service metadata
SERVICE_NAME = "json-transformer"
VERSION = "1.0.0"

# Security/Debug (NEVER enable DEBUG_MODE in production)
DEBUG_MODE = "false"                               # Enable verbose logging with sensitive data

# Secrets configuration:
# Use telnyx-edge secrets add <name> <value> to add the following secrets:
# - API_KEY: External API key for data validation services
# - ENCRYPTION_KEY: Key for encrypting sensitive JSON fields
# - WEBHOOK_SECRET: Secret for webhook-based transformations
# - EXTERNAL_SERVICE_URL: URL for external transformation services