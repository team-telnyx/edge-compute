[edge_compute]
func_id = "webhook-receiver-js-demo"
func_name = "webhook-receiver-js"

[env_vars]
MAX_WEBHOOKS = "500"       # In-memory ring buffer size
SERVICE_NAME = "webhook-receiver"
VERSION = "1.0.0"

# Secrets — add via: telnyx-edge secrets add <name> <value>
#
# WEBHOOK_SECRET  (required for signature verification)
#   HMAC-SHA256 key used to verify x-webhook-signature headers.
#   Leave unset to disable verification (useful during development).
#   telnyx-edge secrets add WEBHOOK_SECRET "your-signing-secret"
